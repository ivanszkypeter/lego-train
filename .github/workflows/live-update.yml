name: live-update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish-web-bundle:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build -- --configuration production

      - name: Prepare live update bundle
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")-${GITHUB_SHA::7}"
          mkdir -p pages/live-update
          (cd www && zip -qr ../pages/live-update/lego-train-web.zip .)
          cat > pages/live-update/manifest.json <<EOF
          {
            "version": "${VERSION}",
            "channel": "stable",
            "url": "https://ivanszkypeter.github.io/lego-train/live-update/lego-train-web.zip",
            "notes": "${GITHUB_SHA}"
          }
          EOF
          cp -R www/* pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
