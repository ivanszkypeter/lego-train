name: android-apk

on:
  workflow_dispatch:
    inputs:
      build_reason:
        description: Why is a new native APK needed?
        required: false
        default: Native shell change
  push:
    branches: [main]
    paths:
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'android/**'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build -- --configuration production

      - name: Create Android native project
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lego-train-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build and sign release APK when keystore secrets exist
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Release signing secrets are not configured. Skipping signed release APK."
            exit 0
          fi

          cd android
          ./gradlew assembleRelease
          cd ..

          mkdir -p android/app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks

          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          UNSIGNED_APK="$(find android/app/build/outputs/apk/release -name '*unsigned*.apk' | head -n 1)"
          ALIGNED_APK="android/app/build/outputs/apk/release/lego-train-release-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/lego-train-release-signed.apk"

          if [ -z "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK was not found."
            find android/app/build/outputs/apk/release -maxdepth 1 -type f || true
            exit 1
          fi

          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks android/app/keystore/release.jks \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify "$SIGNED_APK"

      - name: Upload signed release APK when available
        uses: actions/upload-artifact@v4
        with:
          name: lego-train-release-signed-apk
          path: android/app/build/outputs/apk/release/lego-train-release-signed.apk
          if-no-files-found: ignore
